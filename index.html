<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N5・N4 日文文法解說</title>
<style>
  :root{
    --bg:#f7f5f2; --card:#ffffff; --ink:#26262e; --sub:#7c7c88;
    --brand:#d9534f; --brand2:#e08e56; --accent:#3f72a4; --accent-bg:#eef4fb;
    --line:#ececec; --shadow:0 6px 22px rgba(90,70,60,.10);
    --tag:#f3ede7; --sidebar:#fbf9f6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Hiragino Sans","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.75;
  }
  ruby rt{font-size:.6em; color:var(--accent); font-weight:400}
  body.hide-furigana rt{visibility:hidden}

  /* layout */
  .wrap{display:flex; min-height:100vh}
  aside{
    width:260px; flex-shrink:0; background:var(--sidebar); border-right:1px solid var(--line);
    height:100vh; position:sticky; top:0; overflow-y:auto; padding:0 0 40px;
  }
  aside .brand{padding:22px 20px 14px; border-bottom:1px solid var(--line)}
  aside .brand h1{font-size:1.25rem; color:var(--brand)}
  aside .brand p{font-size:.78rem; color:var(--sub); margin-top:2px}
  .search{padding:12px 16px}
  .search input{width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; font-size:.9rem; background:#fff}
  .search input:focus{outline:none; border-color:var(--accent)}
  .cat-group{padding:4px 10px}
  .cat-title{font-size:.72rem; color:var(--sub); font-weight:700; letter-spacing:1px; padding:12px 10px 4px}
  aside a{
    display:block; padding:7px 12px; font-size:.86rem; color:var(--ink); text-decoration:none;
    border-radius:8px; transition:.12s;
  }
  aside a:hover{background:#fff}
  aside a b{color:var(--accent); font-weight:600}

  main{flex:1; max-width:820px; margin:0 auto; padding:30px 34px 100px}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:10px}
  .topbar h2{font-size:1.8rem}
  .levels{display:inline-flex; background:#fff; border:1px solid var(--line); border-radius:99px; padding:4px}
  .lvbtn{border:none; background:none; font:inherit; font-weight:700; font-size:1rem; padding:7px 22px; border-radius:99px; cursor:pointer; color:var(--sub); transition:.15s}
  .lvbtn.active{background:var(--brand); color:#fff}
  .vmode{display:inline-flex; background:#fff; border:1px solid var(--line); border-radius:99px; padding:3px}
  .vmode button{border:none; background:none; font:inherit; font-size:.8rem; padding:6px 12px; border-radius:99px; cursor:pointer; color:var(--sub)}
  .vmode button.active{background:var(--brand2); color:#fff}
  .fbtn{border:1px solid var(--line); background:#fff; font:inherit; font-size:.85rem; padding:7px 14px; border-radius:99px; cursor:pointer; color:var(--sub)}

  /* 單字卡 */
  .vgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px; margin-bottom:12px}
  .vcard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; cursor:pointer; transition:.15s; box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .vcard:hover{transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--brand2)}
  .v-jp{font-size:1.25rem; font-weight:600; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; line-height:1.5}
  .v-jp .pos{font-size:.66rem; font-weight:600; color:var(--sub); background:var(--tag); padding:2px 7px; border-radius:6px}
  .v-zh{color:var(--sub); margin-top:7px; font-size:.95rem}
  /* 只日文：遮住中文 */
  #content.vm-jp .v-zh{background:var(--tag); border-radius:6px; color:transparent; min-height:1.4em}
  #content.vm-jp .vcard.revealed .v-zh{background:transparent; color:var(--sub)}
  /* 只中文：遮住日文 */
  #content.vm-zh .v-jp{background:var(--tag); border-radius:6px; min-height:1.5em}
  #content.vm-zh .v-jp *{color:transparent !important}
  #content.vm-zh .vcard.revealed .v-jp{background:transparent}
  #content.vm-zh .vcard.revealed .v-jp *{color:var(--ink) !important}
  #content.vm-zh .vcard.revealed .v-jp rt{color:var(--accent) !important}
  #content.vm-zh .vcard.revealed .v-jp .pos{color:var(--sub) !important}
  .fbtn.off{background:var(--accent); color:#fff; border-color:var(--accent)}
  .intro{color:var(--sub); font-size:.95rem; margin-bottom:26px}

  .g{
    background:var(--card); border-radius:16px; padding:24px 26px; margin-bottom:22px;
    box-shadow:var(--shadow); border:1px solid var(--line); scroll-margin-top:16px;
  }
  .g-head{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:4px}
  .g-pattern{font-size:1.5rem; font-weight:700; color:var(--ink)}
  .g-cat{font-size:.72rem; background:var(--tag); color:var(--sub); padding:3px 10px; border-radius:99px}
  .g-meaning{color:var(--brand); font-weight:600; font-size:1rem; margin-bottom:14px}
  .g-explain{margin-bottom:16px}
  .form{
    background:var(--accent-bg); border-left:3px solid var(--accent); border-radius:0 8px 8px 0;
    padding:10px 14px; font-size:.92rem; margin-bottom:16px;
  }
  .form b{color:var(--accent)}
  .ex-title{font-size:.78rem; color:var(--sub); font-weight:700; letter-spacing:1px; margin-bottom:8px}
  .ex{padding:9px 0; border-top:1px dashed var(--line)}
  .ex .jp{font-size:1.12rem}
  .ex .zh{color:var(--sub); font-size:.9rem; margin-top:1px}
  .ex .play{cursor:pointer; color:var(--accent); font-size:.85rem; margin-left:6px; user-select:none}
  .ex .play:hover{text-decoration:underline}

  .empty{text-align:center; color:var(--sub); padding:60px 0}

  /* 分類標題 + 測驗鈕 */
  .cat-header{display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin:30px 0 14px; padding-bottom:8px; border-bottom:2px solid var(--brand)}
  .cat-header:first-child{margin-top:4px}
  .cat-header span{font-size:1.15rem; font-weight:800; color:var(--brand)}
  .quiz-btn{border:none; background:var(--brand2); color:#fff; font:inherit; font-size:.82rem;
    font-weight:700; padding:7px 16px; border-radius:99px; cursor:pointer; transition:.15s; white-space:nowrap}
  .quiz-btn:hover{opacity:.9; transform:translateY(-1px)}

  /* 測驗視窗 */
  .q-overlay{position:fixed; inset:0; background:rgba(40,30,25,.55); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:18px}
  .q-modal{background:#fff; border-radius:22px; width:100%; max-width:520px; padding:26px 26px 30px;
    box-shadow:0 20px 60px rgba(0,0,0,.3); max-height:92vh; overflow:auto; animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
  .q-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
  .q-top .t{font-weight:800; color:var(--brand)}
  .q-close{border:none; background:var(--tag); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1rem; color:var(--sub)}
  .q-progress{color:var(--sub); font-size:.82rem; margin-bottom:14px}
  .q-ask{font-size:.85rem; color:var(--sub); margin-bottom:6px}
  .q-sent{background:var(--accent-bg); border-radius:14px; padding:16px; margin-bottom:6px}
  .q-sent .jp{font-size:1.2rem}
  .q-sent .zh{color:var(--sub); font-size:.9rem; margin-top:2px}
  .q-opts{display:grid; gap:10px; margin-top:14px}
  .q-opts button{font:inherit; font-size:1rem; text-align:left; padding:13px 16px; border:2px solid var(--line);
    background:#fff; border-radius:12px; cursor:pointer; transition:.12s}
  .q-opts button:hover{border-color:var(--accent)}
  .q-opts button.correct{background:var(--ok,#2e9e6b); color:#fff; border-color:var(--ok,#2e9e6b)}
  .q-opts button.wrong{background:#d0473f; color:#fff; border-color:#d0473f}
  .q-opts button:disabled{cursor:default}
  .q-result{text-align:center}
  .q-result .big{font-size:3rem; font-weight:800; color:var(--brand); margin:10px 0}
  .q-again{border:none; background:var(--brand); color:#fff; font:inherit; font-size:1rem; padding:11px 28px; border-radius:99px; cursor:pointer; margin-top:12px}

  /* mobile */
  #menuBtn{display:none}
  #scrim{display:none}
  @media(max-width:820px){
    aside{position:fixed; left:-320px; width:80%; max-width:300px; z-index:50; transition:.25s; box-shadow:0 0 30px rgba(0,0,0,.25)}
    aside.open{left:0}
    #scrim.show{display:block; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:40}
    #menuBtn{display:inline-flex; align-items:center; justify-content:center; position:fixed; top:12px; left:12px; z-index:60;
      background:var(--brand); color:#fff; border:none; width:44px; height:44px; border-radius:12px; font-size:1.25rem; cursor:pointer; box-shadow:var(--shadow)}
    main{padding:64px 14px 90px}
    .topbar{justify-content:flex-start; gap:8px}
    .levels{width:100%; justify-content:space-between; padding:3px}
    .lvbtn{flex:1; padding:8px 2px; font-size:.92rem; text-align:center}
    .vmode{width:100%; justify-content:space-between}
    .vmode button{flex:1; padding:7px 2px; font-size:.8rem; text-align:center}
    .fbtn{font-size:.82rem; padding:7px 12px}
    .topbar h2{font-size:1.5rem}
    .intro{font-size:.9rem; margin-bottom:18px}
    .search input{font-size:16px}
    .g{padding:18px 16px; margin-bottom:16px}
    .g-pattern{font-size:1.3rem}
    .g-meaning{font-size:.98rem}
    .form{font-size:.9rem}
    .cat-header{margin:24px 0 12px}
    .vgrid{grid-template-columns:1fr; gap:10px}
    .ex .jp{font-size:1.05rem}
    .q-modal{padding:22px 18px 26px; border-radius:18px}
    .q-sent .jp{font-size:1.1rem}
  }
</style>
</head>
<body>
<button id="menuBtn">☰</button>
<div id="scrim"></div>
<div class="wrap">
  <aside id="sidebar">
    <div class="brand">
      <h1>JLPT 文法解說</h1>
      <p>日本語能力試験 N5・N4 · 文法まとめ</p>
    </div>
    <div class="search"><input id="search" type="search" placeholder="🔍 搜尋文法（は、たら、そう…）"></div>
    <nav id="toc"></nav>
  </aside>

  <main>
    <div class="topbar">
      <div class="levels">
        <button class="lvbtn active" data-lv="N5">N5</button>
        <button class="lvbtn" data-lv="N4">N4</button>
        <button class="lvbtn" data-lv="LESSON">課別</button>
        <button class="lvbtn" data-lv="VOCAB">單字</button>
      </div>
      <div class="vmode" id="vmode" style="display:none">
        <button data-m="both" class="active">中日對照</button>
        <button data-m="jp">只日文</button>
        <button data-m="zh">只中文</button>
      </div>
      <button class="fbtn" id="furiToggle">隱藏假名注音</button>
    </div>
    <p class="intro" id="intro">日檢 N5 核心文法整理。每條含解說、接續與例句；例句漢字皆標假名，點例句可朗讀日語。</p>
    <div id="content"></div>
  </main>
</div>
<div id="quizRoot"></div>

<script>
/* =========================================================
   N5 文法資料
   每筆：cat 分類 / pattern 句型 / meaning 意思 / explain 解說
        form 接續 / ex 例句[{jp(含ruby), zh}]
   ========================================================= */
const R = (k,r)=>`<ruby>${k}<rt>${r}</rt></ruby>`; // 方便標假名
const DATA = [
/* ---------- 判斷句 ---------- */
{cat:'判斷句', pattern:'〜は〜です', meaning:'～是～（禮貌肯定）',
 explain:'最基本的句型。「は」是主題助詞（讀作 wa），提示句子要談論的主題；「です」放在句尾表示禮貌的斷定，相當於中文的「是」。名詞句、形容詞句都能用「です」收尾。',
 form:'名詞 <b>は</b> 名詞 <b>です</b>',
 ex:[
   {jp:`${R('私','わたし')}は${R('学生','がくせい')}です。`, zh:'我是學生。'},
   {jp:`${R('田中','たなか')}さんは${R('先生','せんせい')}です。`, zh:'田中先生是老師。'},
 ]},
{cat:'判斷句', pattern:'〜じゃ／では ありません', meaning:'～不是（禮貌否定）',
 explain:'「です」的否定形。口語常用「じゃ ありません」，較正式的書面用「では ありません」，兩者意思相同。「では」的「は」同樣讀 wa。',
 form:'名詞 <b>じゃ ありません</b>（＝では ありません）',
 ex:[
   {jp:`${R('私','わたし')}は${R('日本人','にほんじん')}じゃ ありません。`, zh:'我不是日本人。'},
   {jp:`これは${R('本','ほん')}では ありません。`, zh:'這不是書。'},
 ]},
{cat:'判斷句', pattern:'〜でした／じゃ ありませんでした', meaning:'～是（過去）／～不是（過去）',
 explain:'名詞句的過去式。肯定過去用「でした」，否定過去用「じゃ ありませんでした」。時態表現在句尾的「です」上變化，名詞本身不變。',
 form:'名詞 <b>でした</b>／名詞 <b>じゃ ありませんでした</b>',
 ex:[
   {jp:`${R('昨日','きのう')}は${R('休','やす')}みでした。`, zh:'昨天是休假日。'},
   {jp:`テストは${R('簡単','かんたん')}じゃ ありませんでした。`, zh:'考試（當時）不簡單。'},
 ]},
{cat:'判斷句', pattern:'〜も', meaning:'～也',
 explain:'把主題助詞「は」換成「も」，表示「也」，用來承接前面提過、屬性相同的事物。否定句中也可用，表示「也不～」。',
 form:'名詞 <b>も</b> ～です',
 ex:[
   {jp:`${R('私','わたし')}も${R('学生','がくせい')}です。`, zh:'我也是學生。'},
   {jp:`これも${R('私','わたし')}のじゃ ありません。`, zh:'這也不是我的。'},
 ]},

/* ---------- 指示詞 ---------- */
{cat:'指示詞', pattern:'これ／それ／あれ／どれ', meaning:'這個／那個／那個（遠）／哪個',
 explain:'指示「事物」的代名詞。これ＝靠近說話者；それ＝靠近聽話者；あれ＝離兩人都遠；どれ＝疑問「哪一個」。這組不接名詞，本身就是名詞。',
 form:'これ／それ／あれ／どれ ＋ は～です',
 ex:[
   {jp:`これは${R('何','なん')}ですか。`, zh:'這是什麼？'},
   {jp:`あれは${R('私','わたし')}の${R('傘','かさ')}です。`, zh:'那（遠處）是我的傘。'},
 ]},
{cat:'指示詞', pattern:'この／その／あの／どの ＋ 名詞', meaning:'這／那／那（遠）／哪＋名詞',
 explain:'與これ／それ／あれ 距離感相同，但這組「必須接名詞」，用來修飾後面的名詞。不能單獨使用。',
 form:'この／その／あの／どの ＋ 名詞',
 ex:[
   {jp:`この${R('本','ほん')}は${R('面白','おもしろ')}いです。`, zh:'這本書很有趣。'},
   {jp:`どの${R('人','ひと')}が${R('田中','たなか')}さんですか。`, zh:'哪個人是田中先生？'},
 ]},
{cat:'指示詞', pattern:'ここ／そこ／あそこ／どこ', meaning:'這裡／那裡／那裡（遠）／哪裡',
 explain:'指示「場所」的代名詞。用法距離感與これ系列一致。詢問地點時用「どこ」。',
 form:'ここ／そこ／あそこ／どこ ＋ です／に～',
 ex:[
   {jp:`トイレはどこですか。`, zh:'廁所在哪裡？'},
   {jp:`${R('駅','えき')}はあそこです。`, zh:'車站在那邊。'},
 ]},

/* ---------- 助詞 ---------- */
{cat:'助詞', pattern:'〜が（主語）', meaning:'標示主語／新資訊',
 explain:'「が」標示動作或狀態的主體。與「は」不同：「は」提示已知主題，「が」則帶出新的、被強調的資訊。疑問詞（だれ・なに・どれ）當主語時一定用「が」。',
 form:'名詞 <b>が</b> ～（動詞・形容詞）',
 ex:[
   {jp:`${R('誰','だれ')}が${R('来','き')}ましたか。`, zh:'誰來了？'},
   {jp:`${R('空','そら')}が${R('青','あお')}いです。`, zh:'天空是藍的。'},
 ]},
{cat:'助詞', pattern:'〜を', meaning:'標示受詞（動作對象）',
 explain:'「を」（讀 o）標示他動詞動作所及的對象，即受詞。也可表示「經過、離開」的場所（例：公園を散歩する）。',
 form:'名詞 <b>を</b> 動詞（他動詞）',
 ex:[
   {jp:`${R('毎朝','まいあさ')}コーヒーを${R('飲','の')}みます。`, zh:'每天早上喝咖啡。'},
   {jp:`${R('公園','こうえん')}を${R('散歩','さんぽ')}します。`, zh:'在公園散步。'},
 ]},
{cat:'助詞', pattern:'〜に（時間・地點・對象）', meaning:'在（時間點）／存在地點／動作對象',
 explain:'用途多：① 標示具體時間點（７時に）；② 存在的場所（部屋にいる）；③ 動作到達點或對象（友だちに会う、母に電話する）；④ 移動的目的地。是 N5 最重要的助詞之一。',
 form:'時間／場所／對象 <b>に</b>',
 ex:[
   {jp:`${R('毎日','まいにち')}７${R('時','じ')}に${R('起','お')}きます。`, zh:'每天七點起床。'},
   {jp:`${R('友','とも')}だちに${R('会','あ')}います。`, zh:'和朋友見面。'},
 ]},
{cat:'助詞', pattern:'〜で（場所・手段）', meaning:'在（動作場所）／用（手段方法）',
 explain:'① 標示「動作發生的場所」（レストランで食べる）；② 標示手段、工具、材料（バスで行く、日本語で話す）；③ 範圍（クラスで一番）。注意與表示「存在地點」的「に」區分。',
 form:'場所／手段 <b>で</b> 動詞',
 ex:[
   {jp:`${R('図書館','としょかん')}で${R('勉強','べんきょう')}します。`, zh:'在圖書館唸書。'},
   {jp:`バスで${R('学校','がっこう')}へ${R('行','い')}きます。`, zh:'搭公車去學校。'},
 ]},
{cat:'助詞', pattern:'〜へ', meaning:'往～（方向）',
 explain:'「へ」（當助詞時讀 e）標示移動的方向或目的地，後接移動動詞（行く・来る・帰る）。與表目的地的「に」常可互換，「へ」更強調方向。',
 form:'場所 <b>へ</b> 行きます／来ます／帰ります',
 ex:[
   {jp:`${R('来週','らいしゅう')}${R('日本','にほん')}へ${R('行','い')}きます。`, zh:'下週要去日本。'},
   {jp:`${R('家','いえ')}へ${R('帰','かえ')}ります。`, zh:'要回家。'},
 ]},
{cat:'助詞', pattern:'〜と', meaning:'和（並列・一起）／引用',
 explain:'① 連接名詞，表示「和」（完全列舉）；② 表示「和某人一起」做動作；③ 引用內容（〜と言う）。列舉時「と」把項目全部列完，語感較「や」完整。',
 form:'名詞 <b>と</b> 名詞／人 <b>と</b> 動詞',
 ex:[
   {jp:`パンと${R('牛乳','ぎゅうにゅう')}を${R('買','か')}います。`, zh:'買麵包和牛奶。'},
   {jp:`${R('友','とも')}だちと${R('映画','えいが')}を${R('見','み')}ます。`, zh:'和朋友看電影。'},
 ]},
{cat:'助詞', pattern:'〜や〜（など）', meaning:'～和～等（部分列舉）',
 explain:'列舉時只舉出「代表性的幾項」，暗示還有其他，相當於「～啦～之類的」。常與「など（等等）」搭配。與「と」的差別在於「や」是不完全列舉。',
 form:'名詞 <b>や</b> 名詞（<b>など</b>）',
 ex:[
   {jp:`${R('机','つくえ')}の${R('上','うえ')}に${R('本','ほん')}やペンなどが あります。`, zh:'桌上有書和筆等東西。'},
 ]},
{cat:'助詞', pattern:'〜の', meaning:'的（所屬・修飾）',

{cat:'形容詞', pattern:'〜が すきです／じょうずです', meaning:'喜歡～／擅長～',

 ]},

{cat:'動詞', pattern:'動詞て形', meaning:'て形（連接用）',

 ]},

/* =========================================================
   渲染
   ========================================================= */
const content = document.getElementById('content');
const toc = document.getElementById('toc');

function slug(i){ return 'g'+i; }

function render(list){
  // 內容
  content.className = '';
  content.innerHTML = '';
  if(list.length===0){ content.innerHTML='<div class="empty">找不到相符的內容 🥲</div>'; toc.innerHTML=''; return; }
  if(curLv==='VOCAB'){ renderVocab(list); return; }
  let lastCat=null;
  list.forEach((g,idx)=>{
    if(g.cat!==lastCat){
      lastCat=g.cat;
      const h=document.createElement('div'); h.className='cat-header';
      h.innerHTML=`<span>${g.cat}</span><button class="quiz-btn" data-cat="${g.cat}">📝 測驗</button>`;
      content.appendChild(h);
    }
    const el=document.createElement('div'); el.className='g'; el.id=slug(g._i);
    el.innerHTML = `
      <div class="g-head">
        <span class="g-pattern">${g.pattern}</span>
        <span class="g-cat">${g.cat}</span>
      </div>
      <div class="g-meaning">${g.meaning}</div>
      <div class="g-explain">${g.explain}</div>
      <div class="form">接續　${g.form}</div>
      <div class="ex-title">例句</div>
      ${g.ex.map(e=>`<div class="ex"><div class="jp">${e.jp}<span class="play" data-say="${stripRuby(e.jp)}">🔊</span></div><div class="zh">${e.zh}</div></div>`).join('')}
    `;
    content.appendChild(el);
  });
  // 側欄目錄（依分類分組）
  buildTOC(list);
  bindPlay();
  content.querySelectorAll('.quiz-btn').forEach(b=>b.onclick=()=>startQuiz(b.dataset.cat));
}
function stripRuby(html){ return html.replace(/<rt>.*?<\/rt>/g,'').replace(/<\/?ruby>/g,''); }

/* 單字模式 */
let vMode='both';   // both | jp | zh
function renderVocab(list){
  content.className='vm-'+vMode;
  toc.innerHTML='';
  const tg=document.createElement('div'); tg.className='cat-group';
  tg.innerHTML='<div class="cat-title">課次</div>';
  let lastCat=null, grid=null, idx=0;
  list.forEach(v=>{
    if(v.cat!==lastCat){
      lastCat=v.cat; idx++;
      const hid='vcat'+idx;
      const h=document.createElement('div'); h.className='cat-header'; h.id=hid;
      h.innerHTML=`<span>${v.cat}</span>`;
      content.appendChild(h);
      grid=document.createElement('div'); grid.className='vgrid';
      content.appendChild(grid);
      const a=document.createElement('a'); a.href='#'+hid; a.innerHTML=`<b>${v.cat}</b>`;
      a.onclick=()=>{ if(window.innerWidth<=820){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('show');} };
      tg.appendChild(a);
    }
    const c=document.createElement('div'); c.className='vcard';
    c.innerHTML=`<div class="v-jp">${v.jp}<span class="pos">${v.pos}</span></div><div class="v-zh">${v.zh}</div>`;
    c.onclick=()=>{ c.classList.toggle('revealed'); speak(stripRuby(v.jp)); };
    grid.appendChild(c);
  });
  toc.appendChild(tg);
}

function buildTOC(list){
  toc.innerHTML='';
  const groups={};
  list.forEach(g=>{ (groups[g.cat]=groups[g.cat]||[]).push(g); });
  Object.keys(groups).forEach(cat=>{
    const wrap=document.createElement('div'); wrap.className='cat-group';
    wrap.innerHTML=`<div class="cat-title">${cat}</div>`;
    groups[cat].forEach(g=>{
      const a=document.createElement('a'); a.href='#'+slug(g._i);
      a.innerHTML=`<b>${g.pattern.split('（')[0]}</b>`;
      a.onclick=()=>{ if(window.innerWidth<=820){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('show');} };
      wrap.appendChild(a);
    });
    toc.appendChild(wrap);
  });
}

/* 朗讀 */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=.9;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('ja'));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }
function bindPlay(){
  document.querySelectorAll('.play').forEach(p=>p.onclick=()=>speak(p.dataset.say));
}

  return (g.pattern+g.meaning+g.explain+g.cat+g.ex.map(e=>stripRuby(e.jp)+e.zh).join('')).toLowerCase();
}

/* =========================================================
   小測驗
   ========================================================= */
const quizRoot=document.getElementById('quizRoot');
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

let QZ=null;
function startQuiz(cat){
  const items=ALL.filter(g=>g.lv===curLv && g.cat===cat);
  // 每題＝一個例句，問「這句用哪個文法」
  const qs=[];
  items.forEach(it=>{ it.ex.forEach(e=>qs.push({sent:e, answer:it.pattern})); });
  shuffle(qs);
  const picked=qs.slice(0, Math.min(qs.length, 8));
  // 混淆選項來源：同組其他句型，不足時補同級
  const catPats=[...new Set(items.map(i=>i.pattern))];
  const lvPats=[...new Set(ALL.filter(g=>g.lv===curLv).map(i=>i.pattern))];
  QZ={cat, qs:picked, i:0, score:0, catPats, lvPats};
  drawQuiz();
}
function drawQuiz(){
  if(QZ.i>=QZ.qs.length) return quizResult();
  const q=QZ.qs[QZ.i];
  const distractors=shuffle(QZ.catPats.filter(p=>p!==q.answer)).slice(0,3);
  let need=3-distractors.length;
  if(need>0){ distractors.push(...shuffle(QZ.lvPats.filter(p=>p!==q.answer && !distractors.includes(p))).slice(0,need)); }
  const opts=shuffle([q.answer,...distractors]);
  quizRoot.innerHTML=`
    <div class="q-overlay" id="qOverlay">
      <div class="q-modal">
        <div class="q-top"><span class="t">📝 ${QZ.cat} 測驗</span><button class="q-close" id="qClose">✕</button></div>
        <div class="q-progress">第 ${QZ.i+1} / ${QZ.qs.length} 題　得分 ${QZ.score}</div>
        <div class="q-ask">這個句子用的是哪個文法？<span class="play" data-say="${stripRuby(q.sent.jp)}" style="cursor:pointer;color:var(--accent)">🔊</span></div>
        <div class="q-sent"><div class="jp">${q.sent.jp}</div><div class="zh">${q.sent.zh}</div></div>
        <div class="q-opts">${opts.map(o=>`<button data-p="${o}">${o}</button>`).join('')}</div>
      </div>
    </div>`;
  quizRoot.querySelector('#qClose').onclick=closeQuiz;
  quizRoot.querySelector('#qOverlay').onclick=e=>{ if(e.target.id==='qOverlay') closeQuiz(); };
  quizRoot.querySelector('.play').onclick=()=>speak(q.sent.jp.replace(/<rt>.*?<\/rt>/g,'').replace(/<\/?ruby>/g,''));
  speak(stripRuby(q.sent.jp));
  quizRoot.querySelectorAll('.q-opts button').forEach(btn=>{
    btn.onclick=()=>{
      quizRoot.querySelectorAll('.q-opts button').forEach(b=>b.disabled=true);
      if(btn.dataset.p===q.answer){ btn.classList.add('correct'); QZ.score++; }
      else{ btn.classList.add('wrong');
        quizRoot.querySelectorAll('.q-opts button').forEach(b=>{ if(b.dataset.p===q.answer) b.classList.add('correct'); });
      }
      QZ.i++;
      setTimeout(drawQuiz, 1000);
    };
  });
}
function quizResult(){
  const t=QZ.qs.length, s=QZ.score, pct=Math.round(s/t*100);
  const msg = pct===100?'全對！太強了 🎉': pct>=70?'不錯，快熟了！💪': pct>=40?'再複習一下這課吧 📖':'別急，多看幾次解說 🌱';
  quizRoot.innerHTML=`
    <div class="q-overlay" id="qOverlay">
      <div class="q-modal q-result">
        <div class="q-top"><span class="t">📝 ${QZ.cat}</span><button class="q-close" id="qClose">✕</button></div>
        <div class="big">${s}/${t}</div>
        <p>${msg}</p>
        <button class="q-again" id="qAgain">再測一次</button>
      </div>
    </div>`;
  quizRoot.querySelector('#qClose').onclick=closeQuiz;
  quizRoot.querySelector('#qOverlay').onclick=e=>{ if(e.target.id==='qOverlay') closeQuiz(); };
  quizRoot.querySelector('#qAgain').onclick=()=>startQuiz(QZ.cat);
}
function closeQuiz(){ quizRoot.innerHTML=''; }

/* 手機選單 */
const sidebarEl=document.getElementById('sidebar');
const scrimEl=document.getElementById('scrim');
function toggleMenu(open){
  const show = open===undefined ? !sidebarEl.classList.contains('open') : open;
  sidebarEl.classList.toggle('open', show);
  scrimEl.classList.toggle('show', show);
}
document.getElementById('menuBtn').onclick=()=>toggleMenu();
scrimEl.onclick=()=>toggleMenu(false);

refresh();
</script>
